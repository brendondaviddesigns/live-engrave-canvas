function exportSVG() {

  const MM_PER_PIXEL = 0.264583; // standard conversion

  let widthMM = window.innerWidth * MM_PER_PIXEL;
  let heightMM = window.innerHeight * MM_PER_PIXEL;

  let svg = `<svg xmlns="http://www.w3.org/2000/svg"
    width="${widthMM}mm"
    height="${heightMM}mm"
    viewBox="0 0 ${window.innerWidth} ${window.innerHeight}">`;

  paths.forEach(path => {
    let d = `M ${path[0].x} ${path[0].y}`;

    for (let i = 1; i < path.length - 1; i++) {
      const midX = (path[i].x + path[i + 1].x) / 2;
      const midY = (path[i].y + path[i + 1].y) / 2;
      d += ` Q ${path[i].x} ${path[i].y} ${midX} ${midY}`;
    }

    svg += `<path d="${d}" stroke="black" fill="none"/>`;
  });

  svg += "</svg>";

  console.log(svg);
  alert("Laser-ready SVG exported");
}
