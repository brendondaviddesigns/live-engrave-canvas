<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0b0b0f;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }
  .toolbar {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 8px;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: none;
    padding: 8px 12px;
    border-radius: 10px;
    color: white;
  }
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="clearCanvas()">Clear</button>
  <button onclick="exportSVG()">Export SVG</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let currentPath = [];
let paths = [];

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  redraw();
}

function getPoint(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function simplifyPath(path, tolerance = 3) {
  if (path.length <= 2) return path;
  const newPoints = [path[0]];
  for (let i = 1; i < path.length; i++) {
    const dx = path[i].x - newPoints[newPoints.length - 1].x;
    const dy = path[i].y - newPoints[newPoints.length - 1].y;
    if (Math.hypot(dx, dy) > tolerance) {
      newPoints.push(path[i]);
    }
  }
  return newPoints;
}

function drawSmooth(path) {
  if (path.length < 2) return;

  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);

  for (let i = 1; i < path.length - 1; i++) {
    const midX = (path[i].x + path[i + 1].x) / 2;
    const midY = (path[i].y + path[i + 1].y) / 2;
    ctx.quadraticCurveTo(path[i].x, path[i].y, midX, midY);
  }

  ctx.lineWidth = 3;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#ffffff";
  ctx.stroke();
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  paths.forEach(drawSmooth);
  drawSmooth(currentPath);
}

canvas.addEventListener("pointerdown", e => {
  drawing = true;
  currentPath = [getPoint(e)];
});

canvas.addEventListener("pointermove", e => {
  if (!drawing) return;
  currentPath.push(getPoint(e));
  redraw();
});

canvas.addEventListener("pointerup", () => {
  drawing = false;
  const clean = simplifyPath(currentPath);
  if (clean.length > 1) paths.push(clean);
  currentPath = [];
  redraw();
});

function clearCanvas() {
  paths = [];
  currentPath = [];
  redraw();
}

function exportSVG() {
  const MM_PER_PIXEL = 0.264583;

  let widthMM = window.innerWidth * MM_PER_PIXEL;
  let heightMM = window.innerHeight * MM_PER_PIXEL;

  let svg = `<svg xmlns="http://www.w3.org/2000/svg"
    width="${widthMM}mm"
    height="${heightMM}mm"
    viewBox="0 0 ${window.innerWidth} ${window.innerHeight}">`;

  paths.forEach(path => {
    let d = `M ${path[0].x} ${path[0].y}`;

    for (let i = 1; i < path.length - 1; i++) {
      const midX = (path[i].x + path[i + 1].x) / 2;
      const midY = (path[i].y + path[i + 1].y) / 2;
      d += ` Q ${path[i].x} ${path[i].y} ${midX} ${midY}`;
    }

    svg += `<path d="${d}" stroke="black" fill="none"/>`;
  });

  svg += "</svg>";

  console.log(svg);
  alert("Laser-ready SVG exported");
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();
</script>

</body>
</html>
